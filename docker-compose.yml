services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-almatour}
      POSTGRES_USER: ${POSTGRES_USER:-almatour}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-almatour} -d ${POSTGRES_DB:-almatour}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PROJECT_ENV_ID: prod
      DJANGO_SETTINGS_MODULE: settings.env.prod
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_data:/static:ro
      - media_data:/media:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  static_data:
  media_data:
