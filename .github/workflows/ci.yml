name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend – pytest
    runs-on: ubuntu-latest

    services:
      # Tests use SQLite (local settings), so no Postgres service needed.
      # Remove this comment and add a postgres service if you switch to PG for tests.

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/local.txt

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Run tests
        env:
          PROJECT_ENV_ID: local
          DJANGO_SETTINGS_MODULE: settings.env.local
          SECRET_KEY: ci-insecure-key-for-testing-only
        run: pytest --tb=short -q

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend – Vite build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
